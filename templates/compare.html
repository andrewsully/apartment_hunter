<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Compare — Apartment Hunter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0f1117;
      --surf:   #1a1d27;
      --surf2:  #22263a;
      --surf3:  #2a2f45;
      --border: #2a2d3a;
      --accent: #6366f1;
      --cyan:   #22d3ee;
      --green:  #22c55e;
      --amber:  #f59e0b;
      --red:    #ef4444;
      --text:   #e2e8f0;
      --muted:  #64748b;
      --nav-h:  52px;
    }

    html, body {
      min-height: 100%; font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
    }

    /* ── Top nav ── */
    #topnav {
      position: sticky; top: 0; z-index: 200;
      height: var(--nav-h);
      background: var(--surf);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; gap: 12px;
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      text-decoration: none; color: var(--muted);
      font-size: 13px; font-weight: 500;
      padding: 6px 10px; border-radius: 7px;
      transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .nav-back:hover { background: var(--surf2); color: var(--text); }
    .nav-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .nav-title { flex: 1; min-width: 0; }
    .nav-title-main { font-size: 14px; font-weight: 700; }
    .nav-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* ── Price mode chip ── */
    .chip {
      padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surf2); color: var(--muted);
      transition: all 0.15s; white-space: nowrap; flex-shrink: 0; font-family: inherit;
    }
    .chip.active { background: rgba(99,102,241,0.15); border-color: var(--accent); color: var(--accent); }

    /* ── Profile dropdown ── */
    #profile-drop {
      display: none; position: absolute; right: 0; top: calc(100% + 10px);
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 14px; min-width: 224px; z-index: 600;
      box-shadow: 0 12px 40px rgba(0,0,0,0.55); overflow: hidden;
    }
    #profile-drop.open { display: block; }
    .pdrop-section  { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .pdrop-links    { padding: 6px 0; }
    .pdrop-user-header { display: flex; align-items: center; gap: 10px; }
    .pdrop-username { font-size: 13px; font-weight: 700; }
    .pdrop-sub      { font-size: 11px; color: var(--muted); }
    .pdrop-label    { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .pdrop-user-btns { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .pdrop-user-btn {
      display: flex; align-items: center; gap: 6px; padding: 5px 10px;
      border-radius: 8px; border: 1px solid var(--border); background: var(--surf2);
      color: var(--text); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.12s; font-family: inherit;
    }
    .pdrop-user-btn:hover { border-color: var(--accent); }
    .pdrop-price-option {
      display: flex; align-items: center; gap: 9px; width: 100%;
      padding: 7px 10px; border-radius: 8px; border: 1px solid transparent;
      background: transparent; color: var(--muted);
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.12s; font-family: inherit; text-align: left;
    }
    .pdrop-price-option:hover { background: var(--surf2); color: var(--text); }
    .pdrop-price-option.active { color: var(--text); }
    .pdrop-radio { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--border); transition: all 0.12s; }
    .pdrop-price-option.active .pdrop-radio { border-color: var(--accent); background: var(--accent); box-shadow: inset 0 0 0 3px var(--surf); }
    .pdrop-nav-link {
      display: flex; align-items: center; gap: 9px; padding: 9px 16px;
      color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.12s;
    }
    .pdrop-nav-link:hover { background: var(--surf2); color: var(--text); }

    /* ── User identity ── */
    #user-indicator {
      display: flex; align-items: center; gap: 8px;
      background: var(--surf2); border: 1px solid var(--border);
      border-radius: 99px; padding: 4px 10px 4px 6px;
      cursor: pointer; transition: border-color 0.15s;
    }
    #user-indicator:hover { border-color: var(--accent); }
    .user-avatar {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
    }
    .user-name { font-size: 12px; font-weight: 600; }

    /* ── Filter bar ── */
    #filter-bar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      background: var(--surf);
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    #filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 6px 14px; border-radius: 99px; font-size: 12.5px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surf2); color: var(--muted);
      transition: all 0.15s; white-space: nowrap; font-family: inherit;
    }
    .filter-chip.active {
      background: rgba(99,102,241,0.15); border-color: var(--accent); color: var(--accent);
    }
    #filter-bar .count-label { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; flex-shrink: 0; }

    /* ── Main content ── */
    #content {
      max-width: 1000px; margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Section headers ── */
    .section-header {
      font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      margin: 28px 0 12px;
    }
    .section-header:first-child { margin-top: 0; }

    /* ── Apartment cards ── */
    #apt-grid { display: flex; flex-direction: column; gap: 10px; }

    .cmp-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; gap: 0;
      overflow: hidden;
      text-decoration: none; color: inherit;
      transition: border-color 0.15s, transform 0.1s;
      cursor: pointer;
      position: relative;
    }
    .cmp-card:hover { border-color: var(--accent); transform: translateY(-1px); }

    /* Left accent stripe based on consensus */
    .cmp-card::before {
      content: ""; width: 4px; flex-shrink: 0;
      background: var(--border);
    }
    .cmp-card.consensus-allyes::before  { background: var(--green); }
    .cmp-card.consensus-strongyes::before { background: var(--green); opacity: 0.65; }
    .cmp-card.consensus-leanyes::before { background: var(--green); opacity: 0.35; }
    .cmp-card.consensus-mixed::before   { background: var(--amber); opacity: 0.5; }
    .cmp-card.consensus-leanno::before  { background: var(--red); opacity: 0.4; }
    .cmp-card.consensus-allno::before   { background: var(--red); }

    /* Thumbnail */
    .cmp-thumb {
      width: 110px; min-width: 110px; height: 90px;
      object-fit: cover; background: var(--surf2);
      flex-shrink: 0;
    }
    .cmp-thumb-ph {
      width: 110px; min-width: 110px; height: 90px;
      background: var(--surf2); display: flex; align-items: center;
      justify-content: center; font-size: 24px; flex-shrink: 0;
    }

    /* Card body */
    .cmp-body {
      flex: 1; min-width: 0;
      padding: 10px 14px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .cmp-top {
      display: flex; align-items: flex-start; gap: 8px;
      justify-content: space-between;
    }
    .cmp-address { font-size: 13.5px; font-weight: 700; line-height: 1.3; }
    .cmp-sub { font-size: 12px; color: var(--muted); }
    .cmp-rent { font-size: 15px; font-weight: 800; white-space: nowrap; }
    .cmp-rent-unit { font-size: 10px; font-weight: 400; color: var(--muted); }

    /* Vote row */
    .cmp-votes {
      display: flex; gap: 8px; align-items: center;
      margin-top: 4px; flex-wrap: wrap;
    }
    .vote-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 99px;
      font-size: 11px; font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surf2);
    }
    .vote-avatar {
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .vote-pill.v-yes   { background: rgba(34,197,94,0.12);  border-color: rgba(34,197,94,0.35);  color: var(--green); }
    .vote-pill.v-maybe { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.35); color: var(--amber); }
    .vote-pill.v-no    { background: rgba(239,68,68,0.12);  border-color: rgba(239,68,68,0.35);  color: var(--red); }
    .vote-pill.v-none  { color: var(--muted); }

    /* Consensus badge */
    .cmp-badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 99px;
      font-size: 11px; font-weight: 700;
      margin-left: auto; flex-shrink: 0; align-self: flex-end;
    }
    .badge-green  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge-amber  { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge-red    { background: rgba(239,68,68,0.15);  color: var(--red); }
    .badge-muted  { background: var(--surf2); color: var(--muted); }

    /* ── Empty state ── */
    #empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    #empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }

    /* ── User modal ── */
    #user-modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    #user-modal-overlay.open { display: flex; }
    #user-modal {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 24px; width: 320px; max-width: 90vw;
    }
    #user-modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    #user-modal p  { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .user-btn-grid { display: flex; flex-direction: column; gap: 10px; }
    .user-select-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surf2);
      color: var(--text); font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .user-select-btn:hover { border-color: var(--accent); background: rgba(99,102,241,0.08); }
    .user-select-btn .user-avatar { width: 32px; height: 32px; font-size: 14px; }
    .user-select-btn .user-role   { font-size: 11px; font-weight: 400; color: var(--muted); }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      #content { padding: 16px 12px 60px; }
      .cmp-thumb, .cmp-thumb-ph { width: 80px; min-width: 80px; height: 74px; }
      .nav-sub { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Top nav ── -->
<header id="topnav">
  <a href="/" class="nav-back">← Listings</a>
  <div class="nav-divider"></div>
  <div class="nav-title">
    <div class="nav-title-main" style="display:flex;align-items:center;gap:7px;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Group Compare</div>
    <div class="nav-sub">See where everyone stands</div>
  </div>
  <div class="nav-right" style="position:relative;">
    <div id="user-indicator" onclick="toggleProfileMenu(event)" style="cursor:pointer;">
      <div class="user-avatar" id="u-avatar" style="background:#6366f1">A</div>
      <span class="user-name" id="u-name">Andrew</span>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.6"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div id="profile-drop">
      <div class="pdrop-section">
        <div class="pdrop-user-header">
          <div class="user-avatar pdrop-avatar" id="pd-avatar" style="width:28px;height:28px;font-size:11px;background:#6366f1">A</div>
          <div><div class="pdrop-username" id="pd-name">Andrew</div><div class="pdrop-sub">Switch account</div></div>
        </div>
        <div id="pd-user-btns" class="pdrop-user-btns"></div>
      </div>
      <div class="pdrop-section">
        <div class="pdrop-label">Rent Display</div>
        <button class="pdrop-price-option" id="pd-opt-pp"    onclick="setPriceMode('per_person', event)"><span class="pdrop-radio"></span>Per person (÷3)</button>
        <button class="pdrop-price-option" id="pd-opt-total" onclick="setPriceMode('total', event)"><span class="pdrop-radio"></span>Total price</button>
      </div>
      <div class="pdrop-links">
        <a href="/" class="pdrop-nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>All Listings</a>
      </div>
    </div>
  </div>
</header>

<!-- ── Filter bar ── -->
<div id="filter-bar">
  <button class="filter-chip active" data-view="all">All</button>
  <button class="filter-chip" data-view="voted">Has Votes</button>
  <button class="filter-chip" data-view="top">Top Picks</button>
  <span class="count-label" id="count-label">— apartments</span>
</div>

<!-- ── Cards ── -->
<div id="content">
  <div id="apt-grid"></div>
  <div id="empty-state" style="display:none;">
    <h3>No apartments match</h3>
    <p>Try switching the filter above.</p>
  </div>
</div>

<!-- ── User modal ── -->
<div id="user-modal-overlay">
  <div id="user-modal">
    <h2>Who are you?</h2>
    <p>Your votes and notes will be saved under your name.</p>
    <div class="user-btn-grid">
      <button class="user-select-btn" onclick="selectUser('andrew')">
        <div class="user-avatar" style="background:#6366f1">A</div>
        <div><div>Andrew</div><div class="user-role">Primary searcher</div></div>
      </button>
      <button class="user-select-btn" onclick="selectUser('liam')">
        <div class="user-avatar" style="background:#22d3ee">L</div>
        <div><div>Liam</div><div class="user-role">Roommate</div></div>
      </button>
      <button class="user-select-btn" onclick="selectUser('joe')">
        <div class="user-avatar" style="background:#f59e0b">J</div>
        <div><div>Joe</div><div class="user-role">Roommate</div></div>
      </button>
    </div>
  </div>
</div>

<script>
// ── Data from server ──────────────────────────────────────────────────────────
const ALL_APTS = {{ apartments | safe }};

// ── Users ─────────────────────────────────────────────────────────────────────
const USERS = [
  { key: "andrew", name: "Andrew", initial: "A", color: "#6366f1" },
  { key: "liam",   name: "Liam",   initial: "L", color: "#22d3ee" },
  { key: "joe",    name: "Joe",    initial: "J", color: "#f59e0b" },
];
const USER_MAP = Object.fromEntries(USERS.map(u => [u.key, u]));

function getCurrentUser() {
  return localStorage.getItem("apartment_user") || "andrew";
}
function selectUser(key, e) {
  if (e) e.stopPropagation();
  localStorage.setItem("apartment_user", key);
  updateUserIndicator();
  closeProfileMenu();
  document.getElementById("user-modal-overlay").classList.remove("open");
  render();
}
function openUserModal() {
  document.getElementById("user-modal-overlay").classList.add("open");
}
function updateUserIndicator() {
  const u = USER_MAP[getCurrentUser()] || USERS[0];
  document.getElementById("u-avatar").textContent       = u.initial;
  document.getElementById("u-avatar").style.background  = u.color;
  document.getElementById("u-name").textContent         = u.name;
  // Update dropdown header
  const pdAvatar = document.getElementById("pd-avatar");
  const pdName   = document.getElementById("pd-name");
  if (pdAvatar) { pdAvatar.textContent = u.initial; pdAvatar.style.background = u.color; }
  if (pdName)   pdName.textContent = u.name;
  // Render switch-to buttons
  const container = document.getElementById("pd-user-btns");
  if (container) {
    const current = getCurrentUser();
    container.innerHTML = USERS.filter(v => v.key !== current)
      .map(v => `<button class="pdrop-user-btn" onclick="selectUser('${v.key}', event)">
        <div style="width:18px;height:18px;border-radius:50%;background:${v.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0">${v.initial}</div>
        ${v.name}
      </button>`).join("");
  }
}
function toggleProfileMenu(e) {
  if (e) e.stopPropagation();
  document.getElementById("profile-drop").classList.toggle("open");
}
function closeProfileMenu() {
  document.getElementById("profile-drop")?.classList.remove("open");
}
document.addEventListener("click", closeProfileMenu);
document.getElementById("user-modal-overlay").addEventListener("click", function(e) {
  if (e.target === this) this.classList.remove("open");
});

// ── Price mode ────────────────────────────────────────────────────────────────
let priceMode = localStorage.getItem("apartment_price_mode") || "per_person";

function fmtRent(rent) {
  if (!rent) return "—";
  const val = priceMode === "per_person" ? Math.round(rent / 3) : rent;
  return "$" + val.toLocaleString();
}
function fmtRentUnit() {
  return priceMode === "per_person" ? "/ person" : "/ mo";
}
function updatePriceModeDisplay() {
  const isPerPerson = priceMode === "per_person";
  const ppEl    = document.getElementById("pd-opt-pp");
  const totalEl = document.getElementById("pd-opt-total");
  if (ppEl)    ppEl.classList.toggle("active",  isPerPerson);
  if (totalEl) totalEl.classList.toggle("active", !isPerPerson);
}
function setPriceMode(mode, e) {
  if (e) e.stopPropagation();
  priceMode = mode;
  localStorage.setItem("apartment_price_mode", priceMode);
  updatePriceModeDisplay();
  render();
}
function togglePriceMode() { setPriceMode(priceMode === "total" ? "per_person" : "total"); }

// ── Consensus scoring ─────────────────────────────────────────────────────────
function getConsensus(ratings) {
  let yesCount = 0, noCount = 0, maybeCount = 0, totalVotes = 0, score = 0;
  USERS.forEach(u => {
    const cat = ratings?.[u.key]?.list_category;
    if (cat === "yes")   { yesCount++; totalVotes++; score += 2; }
    if (cat === "maybe") { maybeCount++; totalVotes++; score += 1; }
    if (cat === "no")    { noCount++; totalVotes++; score -= 1; }
  });
  if (totalVotes === 0) return { label: "No votes yet", cls: "badge-muted", cardCls: "", score: -999 };
  if (yesCount === 3)                  return { label: "All In",      cls: "badge-green", cardCls: "consensus-allyes",   score };
  if (yesCount === 2 && noCount === 0) return { label: "Strong Yes",  cls: "badge-green", cardCls: "consensus-strongyes", score };
  if (yesCount >= 1 && noCount === 0)  return { label: "Leaning Yes", cls: "badge-green", cardCls: "consensus-leanyes",  score };
  if (noCount === 3)                   return { label: "All No",       cls: "badge-red",   cardCls: "consensus-allno",    score };
  if (noCount >= 2)                    return { label: "Leaning No",  cls: "badge-red",   cardCls: "consensus-leanno",   score };
  return                               { label: "Mixed",              cls: "badge-amber", cardCls: "consensus-mixed",    score };
}

// ── Filter state ──────────────────────────────────────────────────────────────
let activeView = "all"; // "all" | "voted" | "top"

document.querySelectorAll(".filter-chip[data-view]").forEach(btn => {
  btn.addEventListener("click", function() {
    activeView = this.dataset.view;
    document.querySelectorAll(".filter-chip[data-view]").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    render();
  });
});

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  let apts = [...ALL_APTS];

  // Sort by consensus score desc, then rent asc
  apts.sort((a, b) => {
    const sa = getConsensus(a.user_ratings).score;
    const sb = getConsensus(b.user_ratings).score;
    if (sb !== sa) return sb - sa;
    return (a.rent || 0) - (b.rent || 0);
  });

  // Filter
  if (activeView === "voted") {
    apts = apts.filter(a => {
      const r = a.user_ratings || {};
      return USERS.some(u => {
        const cat = r[u.key]?.list_category;
        return cat && cat !== "unsorted";
      });
    });
  } else if (activeView === "top") {
    apts = apts.filter(a => {
      const r = a.user_ratings || {};
      const yesCount = USERS.filter(u => r[u.key]?.list_category === "yes").length;
      return yesCount >= 2;
    });
  }

  document.getElementById("count-label").textContent = `${apts.length} apartment${apts.length !== 1 ? "s" : ""}`;

  const grid = document.getElementById("apt-grid");
  const empty = document.getElementById("empty-state");

  if (apts.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = apts.map(a => renderCard(a)).join("");
}

function renderCard(a) {
  const consensus = getConsensus(a.user_ratings);
  const imgSrc = a.images?.[0] || "";
  const thumbHtml = imgSrc
    ? `<img class="cmp-thumb" src="${imgSrc}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="cmp-thumb-ph" style="display:none"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.2"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4M10 10h4M10 14h4M10 18h4"/></svg></div>`
    : `<div class="cmp-thumb-ph"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.2"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4M10 10h4M10 14h4M10 18h4"/></svg></div>`;

  const voteHtml = USERS.map(u => {
    const cat = a.user_ratings?.[u.key]?.list_category || "unsorted";
    const checkSvg = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const minusSvg = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    const xSvg    = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    const label = cat === "yes" ? `${checkSvg} Yes` : cat === "maybe" ? `${minusSvg} Maybe` : cat === "no" ? `${xSvg} No` : "—";
    const cls   = cat === "yes" ? "v-yes" : cat === "maybe" ? "v-maybe" : cat === "no" ? "v-no" : "v-none";
    return `<span class="vote-pill ${cls}">
      <span class="vote-avatar" style="background:${u.color}">${u.initial}</span>
      ${label}
    </span>`;
  }).join("");

  const beds  = a.bedrooms  != null ? `${a.bedrooms}bd` : "";
  const baths = a.bathrooms != null ? `${a.bathrooms}ba` : "";
  const sqft  = a.sqft      ? `${a.sqft.toLocaleString()}ft²` : "";
  const sub   = [beds, baths, sqft].filter(Boolean).join(" · ");

  return `<a class="cmp-card ${consensus.cardCls}" href="/apartment/${a.id}">
    ${thumbHtml}
    <div class="cmp-body">
      <div class="cmp-top">
        <div>
          <div class="cmp-address">${a.address || "—"}</div>
          <div class="cmp-sub">${sub}</div>
        </div>
        <div style="text-align:right; flex-shrink:0;">
          <div class="cmp-rent">${fmtRent(a.rent)}</div>
          <div class="cmp-rent-unit">${fmtRentUnit()}</div>
        </div>
      </div>
      <div class="cmp-votes">
        ${voteHtml}
        <span class="cmp-badge ${consensus.cls}">${consensus.label}</span>
      </div>
    </div>
  </a>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
updateUserIndicator();
updatePriceModeDisplay();
if (!localStorage.getItem("apartment_user")) {
  setTimeout(() => openUserModal(), 400);
}
render();
</script>
</body>
</html>
